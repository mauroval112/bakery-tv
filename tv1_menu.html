<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Bakery Bethlehem - Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0e0d0d;
    --yellow: #feb913;
    --cream: #eee5da;
    --cream-light: #ede9e7;
    --gold-muted: #c4bd97;
    --white: #ffffff;
    --col-blue: #003893;
    --col-red: #CE1126;
    --col-yellow: #FCD116;
    --card-bg: #1a1a1a;
    --card-border: #2a2a2a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Open Sans', sans-serif;
    overflow: hidden;
    width: 1920px;
    height: 1080px;
  }

  /* Header */
  .header {
    background: var(--black);
    padding: 10px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 80px;
    border-bottom: 3px solid var(--yellow);
  }
  .logo-area { display: flex; align-items: center; gap: 14px; }
  .logo-img { height: 58px; }
  .logo-text-img { height: 46px; }
  .header-right { text-align: right; }
  .header-label {
    font-family: 'Oswald', sans-serif;
    font-size: 30px; font-weight: 700;
    color: var(--yellow);
    text-transform: uppercase; letter-spacing: 3px;
  }
  .header-sub {
    font-size: 15px; color: var(--gold-muted); letter-spacing: 1px;
  }

  .tricolor { display: flex; height: 3px; }
  .tricolor .y { flex: 2; background: var(--col-yellow); }
  .tricolor .b { flex: 1; background: var(--col-blue); }
  .tricolor .r { flex: 1; background: var(--col-red); }

  /* Page system */
  .menu-page {
    display: none;
    padding: 18px 30px;
    height: calc(1080px - 80px - 3px - 44px);
    overflow: hidden;
  }
  .menu-page.active { display: grid; }

  /* Page 1: 3 columns layout */
  .page-3col {
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
  }

  .menu-col {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* Category header */
  .cat-header {
    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--yellow);
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 8px 0 6px;
    border-bottom: 2px solid #333;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cat-icon { font-size: 22px; }

  /* Menu item row */
  .menu-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 7px 0;
    border-bottom: 1px solid #1f1f1f;
  }
  .menu-row:last-child { border-bottom: none; }

  .item-left {
    flex: 1;
  }
  .item-name {
    font-size: 20px;
    font-weight: 600;
    color: var(--cream);
    line-height: 1.3;
  }
  .item-tag {
    font-size: 15px;
    color: var(--gold-muted);
    font-weight: 300;
    margin-top: 1px;
  }
  .item-price {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--yellow);
    white-space: nowrap;
    margin-left: 10px;
  }

  /* Badge */
  .item-badge {
    display: inline-block;
    background: var(--col-red);
    color: white;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-left: 8px;
    font-family: 'Oswald', sans-serif;
    vertical-align: middle;
  }

  /* Footer */
  .footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--black);
    padding: 8px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 2px solid var(--yellow);
    height: 44px;
  }
  .footer-text {
    font-size: 15px; color: var(--gold-muted);
  }
  .footer-hl { color: var(--yellow); font-weight: 700; }
  .footer-addr { font-size: 14px; color: var(--cream); }

  /* Page indicator */
  .page-dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .page-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #333; transition: all 0.3s;
  }
  .page-dot.active {
    background: var(--yellow); transform: scale(1.3);
  }
  .page-label {
    font-family: 'Oswald', sans-serif;
    font-size: 14px; color: var(--gold-muted);
    letter-spacing: 1px; margin-right: 8px;
  }
</style>
</head>

<script>
const FEATURED = {"Hot Drinks": [{"name": "Espresso", "price": "1.95 / 2.75", "tag": "Single / Double"}, {"name": "Cappuccino", "price": "3.95 / 4.75", "tag": "12oz / 20oz"}, {"name": "Americano", "price": "2.95 / 3.50", "tag": "12oz / 20oz"}, {"name": "Hot Chocolate", "price": "3.95 / 4.75", "tag": "12oz / 20oz"}], "Hot Station": [{"name": "Empanada", "price": "2.25", "tag": "Beef \u00b7 Chicken \u00b7 Cheese", "badge": "#1 BEST SELLER"}, {"name": "Chicken Puff Pastry", "price": "3.85", "tag": ""}, {"name": "Colombian Egg Arepa", "price": "3.95", "tag": ""}, {"name": "Papa Rellena", "price": "5.25", "tag": "Stuffed Potato"}, {"name": "Bu\u00f1uelos", "price": "2.00", "tag": ""}], "Colombian Bread": [{"name": "Almoj\u00e1banas", "price": "2.00", "tag": "", "badge": "TOP 3"}, {"name": "Pandebono", "price": "2.00", "tag": ""}, {"name": "Grandmother Bread", "price": "6.85", "tag": ""}, {"name": "Cheese Bread", "price": "1.50 / 4.35", "tag": "Small / Medium"}, {"name": "Hawaiian Bread", "price": "2.85", "tag": ""}, {"name": "Pepperoni Bread", "price": "2.85", "tag": ""}], "Sweet Pastry": [{"name": "Croissant Filled", "price": "3.85", "tag": ""}, {"name": "Guava Pastry", "price": "2.95", "tag": ""}, {"name": "Turnover", "price": "3.65", "tag": ""}, {"name": "Elephant Ears", "price": "2.50", "tag": ""}, {"name": "Thousand Layer", "price": "4.85", "tag": "Mil Hojas"}], "Cakes & Desserts": [{"name": "Tres Leches", "price": "5.50", "tag": ""}, {"name": "Cheesecake Slice", "price": "4.85", "tag": ""}, {"name": "Flan Slice", "price": "4.85", "tag": ""}, {"name": "Cake Slices", "price": "4.85", "tag": "Strawberry \u00b7 Tiramisu \u00b7 Carrot \u00b7 Red Velvet \u00b7 Oreo \u00b7 Chocolate"}, {"name": "Passion Fruit Mousse", "price": "4.85", "tag": ""}], "Cold & Frozen": [{"name": "Slushies", "price": "3.95", "tag": "Panela Lemon \u00b7 Fruit \u00b7 Coffee"}, {"name": "Colombiana Postobon", "price": "2.50", "tag": ""}, {"name": "Hit Juice", "price": "2.50 / 5.25", "tag": "8oz / 1Lt"}, {"name": "Water", "price": "1.50", "tag": ""}]};

const CAT_ICONS = {
  'Hot Drinks': '☕', 'Hot Station': '🔥', 'Colombian Bread': '🍞',
  'Sweet Pastry': '🧁', 'Cakes & Desserts': '🎂', 'Cold & Frozen': '🧊'
};

// Distribute categories across 2 pages of 3 columns each
const PAGE_LAYOUT = [
  [['Hot Drinks', 'Cold & Frozen'], ['Hot Station'], ['Colombian Bread']],
  [['Sweet Pastry'], ['Cakes & Desserts'], []]
];

function buildPages() {
  const container = document.getElementById('pagesContainer');
  const dotsContainer = document.getElementById('pageDots');
  
  PAGE_LAYOUT.forEach((pageCols, pageIdx) => {
    // Skip empty pages
    const hasContent = pageCols.some(col => col.length > 0);
    if (!hasContent) return;
    
    const page = document.createElement('div');
    page.className = 'menu-page page-3col' + (pageIdx === 0 ? ' active' : '');
    
    pageCols.forEach(colCats => {
      const col = document.createElement('div');
      col.className = 'menu-col';
      
      colCats.forEach(catName => {
        if (!FEATURED[catName]) return;
        
        const header = document.createElement('div');
        header.className = 'cat-header';
        header.innerHTML = '<span class="cat-icon">' + (CAT_ICONS[catName]||'•') + '</span>' + catName;
        col.appendChild(header);
        
        FEATURED[catName].forEach(item => {
          const row = document.createElement('div');
          row.className = 'menu-row';
          
          let nameHTML = '<span class="item-name">' + item.name;
          if (item.badge) nameHTML += '<span class="item-badge">' + item.badge + '</span>';
          nameHTML += '</span>';
          
          let tagHTML = item.tag ? '<div class="item-tag">' + item.tag + '</div>' : '';
          
          row.innerHTML = '<div class="item-left">' + nameHTML + tagHTML + '</div>' +
                          '<span class="item-price">$' + item.price + '</span>';
          col.appendChild(row);
        });
      });
      
      page.appendChild(col);
    });
    
    container.appendChild(page);
    
    const dot = document.createElement('div');
    dot.className = 'page-dot' + (pageIdx === 0 ? ' active' : '');
    dotsContainer.appendChild(dot);
  });
}

// Page rotation
function rotatePages() {
  const pages = document.querySelectorAll('.menu-page');
  const dots = document.querySelectorAll('.page-dot');
  if (pages.length <= 1) return;
  
  let current = 0;
  setInterval(() => {
    pages[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = (current + 1) % pages.length;
    pages[current].classList.add('active');
    dots[current].classList.add('active');
  }, 10000);
}

buildPages();
rotatePages();
setTimeout(() => location.reload(), 1800000);
</script>
