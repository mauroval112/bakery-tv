<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bakery Bethlehem - The Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  
  /* ═══ RESPONSIVE SCALING ═══ */
  html {
    font-size: 0.94vw; /* 1rem ≈ 18px at 1920w, scales proportionally */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh;
    overflow: hidden; font-family: 'Lato', sans-serif;
    color: #fff; background: #111;
  }

  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.15'/%3E%3C/svg%3E"),
      radial-gradient(ellipse at 15% 20%, rgba(255,255,255,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 75% 60%, rgba(255,255,255,0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 90%, rgba(255,255,255,0.02) 0%, transparent 40%),
      linear-gradient(160deg, #1a1a1a 0%, #0f0f0f 40%, #141414 60%, #0a0a0a 100%);
  }
  .bg::after {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(circle at 30% 40%, rgba(255,255,255,0.025) 0%, transparent 30%),
      radial-gradient(circle at 70% 25%, rgba(255,255,255,0.02) 0%, transparent 25%),
      radial-gradient(circle at 85% 75%, rgba(255,255,255,0.03) 0%, transparent 35%);
  }

  .page {
    position: absolute; inset: 0; z-index: 1;
    display: none; padding: 2.2vh 2.6vw;
    opacity: 0; transition: opacity 0.8s ease;
  }
  .page.active { display: block; opacity: 1; }

  .title-area { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); text-align: center; }
  .title-the { font-family: 'Oswald'; font-size: 2.22rem; font-weight: 800; color: #feb913; text-transform: uppercase; letter-spacing: 8px; line-height: 1; }
  .title-menu { font-family: 'Oswald'; font-size: 5.0rem; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 6px; line-height: 0.9; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }

  .logo-bottom { position: absolute; bottom: 2.8vh; left: 2.1vw; display: flex; align-items: flex-end; gap: 12px; }
  .logo-bottom img { height: 4.6vh; }
  .logo-flag { display: flex; width: 60px; height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
  .logo-flag .y { flex: 2; background: #FCD116; }
  .logo-flag .b { flex: 1; background: #003893; }
  .logo-flag .r { flex: 1; background: #CE1126; }
  .colombian-label { position: absolute; bottom: 2.8vh; left: 50%; transform: translateX(-50%); font-family: 'Oswald'; font-size: 1.33rem; font-weight: 700; color: #feb913; text-transform: uppercase; letter-spacing: 6px; }

  .two-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 3.1vw; margin-top: 13vh; }
  .cat-title { font-family: 'Oswald'; font-size: 1.78rem; font-weight: 700; color: #feb913; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 16px; }

  .item-row { display: flex; align-items: baseline; padding: 8px 0; }
  .item-name { font-family: 'Oswald'; font-size: 1.22rem; font-weight: 500; color: rgba(255,255,255,0.9); text-transform: uppercase; letter-spacing: 2px; }
  .item-desc { font-size: 0.78rem; color: rgba(255,255,255,0.45); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  .item-price { font-family: 'Oswald'; font-size: 1.33rem; font-weight: 700; color: #fff; white-space: nowrap; margin-left: auto; padding-left: 16px; }

  .badge { display: inline-block; background: #CE1126; color: #fff; font-family: 'Oswald'; font-size: 0.67rem; font-weight: 700; padding: 3px 10px; border-radius: 4px; text-transform: uppercase; letter-spacing: 2px; margin-left: 10px; vertical-align: middle; }
  .badge.gold { background: #feb913; color: #111; }

  .size-header { display: flex; justify-content: flex-end; gap: 30px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 8px; }
  .size-label { font-family: 'Oswald'; font-size: 1.0rem; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 2px; width: 70px; text-align: center; }
  .price-cols { display: flex; justify-content: flex-end; gap: 30px; margin-left: auto; padding-left: 16px; }
  .price-col { font-family: 'Oswald'; font-size: 1.22rem; font-weight: 700; color: #fff; width: 70px; text-align: center; }

  .photo-circle { width: 7.3vw; height: 7.3vw; border-radius: 50%; overflow: hidden; border: 3px solid rgba(255,255,255,0.15); box-shadow: 0 4px 20px rgba(0,0,0,0.4); flex-shrink: 0; }
  .photo-circle img { width: 100%; height: 100%; object-fit: cover; }
  .photo-circle.large { width: 8.8vw; height: 8.8vw; }
  .photos-row { display: flex; gap: 20px; margin-top: 24px; justify-content: center; }

  .page-nav { position: fixed; bottom: 2.8vh; right: 2.1vw; display: flex; gap: 10px; z-index: 10; align-items: center; }
  .page-dot { width: 0.55rem; height: 0.55rem; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all 0.4s; }
  .page-dot.active { background: #feb913; transform: scale(1.4); box-shadow: 0 0 8px #feb91366; }

  .update-badge { position: fixed; top: 12px; right: 16px; z-index: 10; font-size: 0.67rem; color: rgba(255,255,255,0.25); font-family: 'Lato'; }

  /* Loading state */
  .loading-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: #0e0d0d;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    transition: opacity 0.5s ease;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 2.2rem; height: 2.2rem;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #feb913;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'Oswald'; font-size: 1.0rem; color: #feb913; letter-spacing: 3px; text-transform: uppercase; }

  /* ═══ FULLSCREEN TV MODE ═══ */
  body, html {
    margin: 0; padding: 0;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }
  /* Force fill regardless of browser chrome */
  .page, .bg, .loading-overlay {
    width: 100vw !important;
    height: 100vh !important;
  }

</style>
</head>
<body>

<div class="bg"></div>
<div class="loading-overlay" id="loader">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading Menu...</div>
</div>
<div class="update-badge" id="updateBadge"></div>
<div id="pagesContainer"></div>
<div class="page-nav" id="pageNav"></div>

  "Colombian Stuffed Potatoes (Papa Rellena)": [5.25], "Bunuelos": [2.00],
  "Almojábanas": [2.00], "Pandebono": [2.00], "Grandmother Bread": [6.85],
  "Cheese Bread / Small": [1.50], "Cheese Bread / Medium": [4.35],
  "Hawaiian Bread": [2.85], "Pepperoni Bread": [2.85], "Hot Dog Bread": [2.50],
  "Croissant / Filled": [3.85], "Guava Pastry": [2.95], "Turnover": [3.65],
  "Elephant Ears Pastry": [2.50], "Thousand Layer Pastry": [4.85],
  "Pear Pastry (Peras)": [3.95], "Gloria Pastry": [3.25],
  "Regular Tres Leches Dessert": [5.50], "CheeseCake": [4.85], "Flan": [4.85],
  "Passion Fruit Mousse": [4.85], "Cake Slice / Strawberry": [4.85],
  "Cake Slice / Tiramisu": [4.85], "Rice Pudding": [4.60],

};

// Build price lookup from Square API data
function buildPriceLookup(menuData) {
  const lookup = {};
  for (const [cat, items] of Object.entries(menuData)) {
    for (const item of items) {
      lookup[item.name] = item.variations.map(v => v.price);
      // Also store variation names
      lookup[item.name + "_vars"] = item.variations.map(v => v.name);
    }
  }
  return lookup;
}

// Format price display
function formatPrice(prices) {
  if (!prices || prices.length === 0) return "—";
  if (prices.length === 1) return prices[0].toFixed(2);
  return prices.map(p => p.toFixed(2)).join(" / ");
}

// Build a page
function buildPage(pageKey, prices) {
  const config = KEY_ITEMS[pageKey];
  const page = document.createElement('div');
  page.className = 'page';

  let html = `
    <div class="title-area"><div class="title-the">The</div><div class="title-menu">Menu</div></div>
    <div class="two-cols">`;

  for (const side of ['left', 'right']) {
    const col = config[side];
    if (!col) { html += '<div class="col"></div>'; continue; }

    html += '<div class="col">';

    // Split combined titles (for page 3 right)
    const titles = col.title.split(' + ');
    html += `<div class="cat-title">${titles[0]}</div>`;

    if (col.hasSizes) {
      html += `<div class="size-header">${col.sizes.map(s => `<div class="size-label">${s}</div>`).join('')}</div>`;
    }

    for (const itemName of col.items) {
      const itemPrices = prices[itemName] || FALLBACK_PRICES[itemName] || [0];
      const badge = col.badges?.[itemName];
      const badgeClass = badge === "Top 3" ? "badge gold" : "badge";
      const badgeHtml = badge ? `<span class="${badgeClass}">${badge}</span>` : '';

      // Get description from variation names if multi-var
      const varNames = prices[itemName + "_vars"] || [];
      let desc = '';
      if (itemName === "Empanada") desc = 'Beef · Chicken · Cheese';
      else if (itemName === "Colombian Stuffed Potatoes (Papa Rellena)") desc = 'Colombian Stuffed Potato';

      if (col.hasSizes && itemPrices.length >= 2) {
        html += `<div class="item-row">
          <div><div class="item-name">${itemName.replace(/ \/.*/,'')}${badgeHtml}</div>${desc ? `<div class="item-desc">${desc}</div>` : ''}</div>
          <div class="price-cols">${itemPrices.slice(0,2).map(p => `<div class="price-col">${p.toFixed(2)}</div>`).join('')}</div>
        </div>`;
      } else {
        // Check if second title needed (combined categories)
        if (titles.length > 1 && itemName === "Large Triple Chocolate Cookie") {
          html += `<div style="margin-top:20px"><div class="cat-title">${titles[1]}</div></div>`;
        }
        html += `<div class="item-row">
          <div><div class="item-name">${itemName.replace(/ \/.*/,'').replace(/ - 20 oz/,'').replace(/ 12oz/,'').replace(/ 11 oz/,'').replace(/ 16oz/,'').replace(/Regular /,'')}${badgeHtml}</div>${desc ? `<div class="item-desc">${desc}</div>` : ''}</div>
          <div class="item-price">${formatPrice(itemPrices)}</div>
        </div>`;
      }
    }

    // Photos
    if (col.photos && col.photos.length > 0) {
      html += '<div class="photos-row" style="margin-top:20px">';
      col.photos.forEach((name, i) => {
        const url = PRODUCT_PHOTOS[name];
        if (url) {
          const cls = i === 0 && col.photos.length <= 2 ? 'photo-circle large' : 'photo-circle';
          html += `<div class="${cls}"><img src="${url}" alt="${name}"></div>`;
        }
      });
      html += '</div>';
    }

    html += '</div>';
  }

  html += `</div>
    <div class="logo-bottom">
      <img src="${LOGO_TEXT}" alt="">
      <div class="logo-flag"><div class="y"></div><div class="b"></div><div class="r"></div></div>
    </div>
    <div class="colombian-label">Colombian Bakery</div>`;

  page.innerHTML = html;
  return page;
}

// Main init
async function init() {
  let prices = FALLBACK_PRICES;
  let source = "fallback";

  try {
    const resp = await fetch(WORKER_URL, { signal: AbortSignal.timeout(8000) });
    if (resp.ok) {
      const data = await resp.json();
      prices = buildPriceLookup(data.menu);
      source = "live";
      document.getElementById('updateBadge').textContent = `Live prices · Updated ${new Date(data.updated_at).toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'})}`;
    }
  } catch (e) {
    console.warn("Worker unreachable, using fallback prices:", e.message);
    document.getElementById('updateBadge').textContent = "Offline prices";
  }

  const container = document.getElementById('pagesContainer');
  const nav = document.getElementById('pageNav');

  for (const pageKey of ['page1', 'page2', 'page3']) {
    const page = buildPage(pageKey, prices);
    container.appendChild(page);

    const dot = document.createElement('div');
    dot.className = 'page-dot';
    nav.appendChild(dot);
  }

  // Activate first page
  const pages = document.querySelectorAll('.page');
  const dots = document.querySelectorAll('.page-dot');
  pages[0].classList.add('active');
  dots[0].classList.add('active');

  // Hide loader
  document.getElementById('loader').classList.add('hidden');

  // Rotate pages
  let current = 0;
  setInterval(() => {
    pages[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = (current + 1) % pages.length;
    pages[current].classList.add('active');
    dots[current].classList.add('active');
  }, 12000);
}

init();

// Auto-refresh every 30 min
setTimeout(() => location.reload(), 1800000);
</script>
