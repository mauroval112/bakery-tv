<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Bakery Bethlehem - Social Wall</title>
<script src="https://elfsightcdn.com/platform.js" async></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0e0d0d;
    --black-soft: #151311;
    --black-card: #1C1915;
    --yellow: #feb913;
    --yellow-dim: #d4a024;
    --cream: #eee5da;
    --gold-muted: #c4bd97;
    --brown: #5C4A3A;
    --col-blue: #003893;
    --col-red: #CE1126;
    --col-yellow: #FCD116;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    width: 1920px;
    height: 1080px;
    color: #fff;
  }

  /* ═══ BACKGROUND PHOTO COLLAGE ═══ */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
  }
  .bg-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.06;
    filter: grayscale(40%) blur(2px);
  }
  /* Dark overlay on top of photos */
  .bg-overlay {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(254,185,19,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(254,185,19,0.03) 0%, transparent 60%),
      linear-gradient(180deg, rgba(14,13,13,0.3) 0%, transparent 30%, transparent 70%, rgba(14,13,13,0.3) 100%);
  }

  /* ═══ HEADER ═══ */
  .header {
    position: relative; z-index: 2;
    background: rgba(14,13,13,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 78px;
    border-bottom: 2px solid rgba(254,185,19,0.3);
  }
  .logo-area { display: flex; align-items: center; gap: 14px; }
  .logo-img { height: 54px; border-radius: 50%; }
  .logo-text-img { height: 40px; }

  .header-pills {
    display: flex;
    gap: 16px;
  }
  .pill {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 18px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    letter-spacing: 0.3px;
  }
  .pill .ic { font-size: 16px; }

  .header-live {
    display: flex; align-items: center; gap: 10px;
  }
  .live-label {
    font-family: 'Oswald', sans-serif;
    font-size: 18px; font-weight: 600;
    color: var(--yellow);
    text-transform: uppercase;
    letter-spacing: 3px;
  }
  .live-dot {
    width: 10px; height: 10px;
    background: #4CAF50;
    border-radius: 50%;
    animation: pulse 2s infinite;
    box-shadow: 0 0 8px #4CAF5066;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.5); }
  }

  /* ═══ TRICOLOR ═══ */
  .tricolor { display: flex; height: 2px; position: relative; z-index: 2; }
  .tricolor .y { flex: 2; background: var(--col-yellow); }
  .tricolor .b { flex: 1; background: var(--col-blue); }
  .tricolor .r { flex: 1; background: var(--col-red); }

  /* ═══ MAIN GRID ═══ */
  .main {
    position: relative; z-index: 2;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    padding: 14px 18px;
    height: calc(1080px - 78px - 2px);
  }

  /* ═══ COLUMN CARDS ═══ */
  .col-card {
    background: rgba(20,18,15,0.82);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.5s ease forwards;
  }
  .col-card:nth-child(1) { animation-delay: 0.1s; }
  .col-card:nth-child(2) { animation-delay: 0.2s; }
  .col-card:nth-child(3) { animation-delay: 0.3s; }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ═══ COLUMN HEADERS ═══ */
  .col-top {
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: rgba(0,0,0,0.3);
  }
  .col-icon { font-size: 20px; }
  .col-name {
    font-family: 'Oswald', sans-serif;
    font-size: 18px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.85);
  }
  .col-badge {
    margin-left: auto;
    font-size: 14px; font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: 'DM Sans', sans-serif;
  }
  .ig .col-badge { background: #E1306C22; color: #E1306C; }
  .tt .col-badge { background: #25F4EE18; color: #25F4EE; }
  .gr .col-badge { background: #FFC10722; color: #FFC107; }

  /* Accent line under header */
  .ig .col-top { border-bottom-color: #E1306C33; }
  .tt .col-top { border-bottom-color: #25F4EE22; }
  .gr .col-top { border-bottom-color: #FFC10733; }

  /* ═══ WIDGET AREA ═══ */
  .widget-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .widget-scroll {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding: 6px;
  }
  .widget-scroll::-webkit-scrollbar { display: none; }

  /* Fade edges */
  .widget-wrap::before,
  .widget-wrap::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 36px;
    z-index: 3;
    pointer-events: none;
  }
  .widget-wrap::before {
    top: 0;
    background: linear-gradient(to bottom, rgba(20,18,15,0.95), transparent);
  }
  .widget-wrap::after {
    bottom: 0;
    background: linear-gradient(to top, rgba(20,18,15,0.95), transparent);
  }

  /* ═══ GLOW ACCENTS ═══ */
  .ig::before, .tt::before, .gr::before {
    content: '';
    position: absolute;
    top: -1px; left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 2px;
    border-radius: 2px;
    z-index: 1;
  }
  .col-card { position: relative; }
  .ig::before { background: linear-gradient(90deg, transparent, #E1306C66, transparent); }
  .tt::before { background: linear-gradient(90deg, transparent, #25F4EE44, transparent); }
  .gr::before { background: linear-gradient(90deg, transparent, #FFC10744, transparent); }
</style>
</head>

<script>
// ═══ AUTO-SCROLL ═══
function initAutoScroll(id, speed, delay) {
  setTimeout(() => {
    const el = document.getElementById(id);
    if (!el) return;
    let pos = 0, dir = 1;
    function step() {
      const max = el.scrollHeight - el.clientHeight;
      if (max <= 0) { requestAnimationFrame(step); return; }
      pos += speed * dir;
      if (pos >= max) {
        pos = max; dir = 0;
        setTimeout(() => { dir = -1; }, 3500);
      } else if (pos <= 0) {
        pos = 0; dir = 0;
        setTimeout(() => { dir = 1; }, 3500);
      }
      el.scrollTop = pos;
      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }, delay);
}

// Wait for Elfsight, then start staggered scroll
setTimeout(() => {
  initAutoScroll('scrollIG', 0.4, 0);
  initAutoScroll('scrollTT', 0.5, 2000);
  initAutoScroll('scrollGR', 0.35, 4000);
}, 6000);

// Cycle background photos opacity for subtle animation
const bgPhotos = document.querySelectorAll('.bg-photo');
let bgIdx = 0;
setInterval(() => {
  bgPhotos.forEach(p => p.style.opacity = '0.03');
  bgPhotos[bgIdx].style.transition = 'opacity 3s ease';
  bgPhotos[bgIdx].style.opacity = '0.09';
  bgIdx = (bgIdx + 1) % bgPhotos.length;
}, 8000);

setTimeout(() => location.reload(), 1800000);
</script>
