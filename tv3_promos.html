<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Bakery Bethlehem - Promos</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0e0d0d;
    --yellow: #feb913;
    --cream: #eee5da;
    --cream-light: #ede9e7;
    --gold-muted: #c4bd97;
    --white: #ffffff;
    --col-blue: #003893;
    --col-red: #CE1126;
    --col-yellow: #FCD116;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    font-family: 'Open Sans', sans-serif;
    overflow: hidden;
    width: 1920px;
    height: 1080px;
    color: var(--white);
  }

  .header {
    background: var(--black);
    padding: 12px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 80px;
    border-bottom: 3px solid var(--yellow);
  }
  .logo-area { display: flex; align-items: center; gap: 14px; }
  .logo-img { height: 56px; }
  .logo-text-img { height: 44px; }
  .header-right {
    font-family: 'Oswald', sans-serif;
    font-size: 26px; font-weight: 700;
    color: var(--yellow);
    text-transform: uppercase; letter-spacing: 3px;
  }

  .tricolor { display: flex; height: 3px; }
  .tricolor .y { flex: 2; background: var(--col-yellow); }
  .tricolor .b { flex: 1; background: var(--col-blue); }
  .tricolor .r { flex: 1; background: var(--col-red); }

  .main {
    display: grid;
    grid-template-columns: 52% 48%;
    height: calc(1080px - 80px - 3px);
  }

  /* LEFT: Promos */
  .promos-side {
    padding: 24px 32px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .section-label {
    font-family: 'Oswald', sans-serif;
    font-size: 28px; font-weight: 700;
    color: var(--yellow);
    text-transform: uppercase; letter-spacing: 3px;
    padding-bottom: 10px;
    margin-bottom: 16px;
    border-bottom: 2px solid #333;
    display: flex; align-items: center; gap: 10px;
  }

  .promo-card {
    background: #1a1a1a;
    border-radius: 14px;
    padding: 22px 26px;
    border: 1px solid #2a2a2a;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateX(-20px);
    animation: slideIn 0.5s ease forwards;
  }
  .promo-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
    background: var(--yellow);
    border-radius: 14px 0 0 14px;
  }
  .promo-card.special::before { background: var(--col-red); }
  .promo-card.new::before { background: #4CAF50; }

  .promo-badge {
    display: inline-block;
    background: var(--col-red);
    color: white;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 14px; font-weight: 900;
    text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 8px;
    font-family: 'Oswald', sans-serif;
  }
  .promo-badge.new { background: #4CAF50; }
  .promo-badge.weekly { background: var(--yellow); color: var(--black); }

  .promo-title {
    font-family: 'Oswald', sans-serif;
    font-size: 28px; font-weight: 700;
    color: var(--white); margin-bottom: 4px;
    text-transform: uppercase;
  }
  .promo-desc {
    font-size: 18px; color: var(--gold-muted);
    line-height: 1.4; margin-bottom: 6px;
  }
  .promo-price {
    font-size: 34px; font-weight: 700;
    color: var(--yellow);
    font-family: 'Oswald', sans-serif;
  }
  .old-price {
    font-size: 18px; color: #666;
    text-decoration: line-through;
    font-weight: 400; margin-right: 8px;
  }
  .promo-valid { font-size: 15px; color: #555; margin-top: 4px; }

  @keyframes slideIn {
    to { opacity: 1; transform: translateX(0); }
  }

  .promo-page { display: none; flex-direction: column; gap: 14px; flex: 1; }
  .promo-page.active { display: flex; }

  .promo-dots { display: flex; justify-content: center; gap: 8px; padding: 10px; }
  .promo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #333; transition: all 0.3s;
  }
  .promo-dot.active { background: var(--yellow); transform: scale(1.4); }

  /* RIGHT: Photo slideshow */
  .photos-side {
    position: relative; overflow: hidden;
    border-left: 1px solid #222;
  }

  .slide {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0; transition: opacity 1.2s ease;
  }
  .slide.active { opacity: 1; }
  .slide img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .slide-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(14,13,13,0.9));
    padding: 40px 30px 24px;
  }
  .slide-title {
    font-family: 'Oswald', sans-serif;
    font-size: 38px; font-weight: 700;
    color: var(--white); text-transform: uppercase;
    letter-spacing: 2px;
  }
  .slide-sub {
    font-size: 20px; color: var(--yellow);
    letter-spacing: 2px; text-transform: uppercase;
    margin-top: 4px;
  }

  .slide-indicators {
    position: absolute; bottom: 16px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 5;
  }
  .indicator {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.3); transition: all 0.4s;
  }
  .indicator.active { background: var(--yellow); transform: scale(1.3); }

  .clock-display {
    position: fixed; bottom: 10px; left: 24px;
    font-size: 15px; color: #555; z-index: 10;
  }
</style>
</head>

];

const PROMO_PAGE_SIZE = 3;
const PROMO_INTERVAL = 8000;
const SLIDE_INTERVAL = 6000;

function buildPromos() {
  const container = document.getElementById('promoContainer');
  const dotsC = document.getElementById('promoDots');
  const pages = [];
  for (let i = 0; i < PROMOS.length; i += PROMO_PAGE_SIZE) {
    const page = document.createElement('div');
    page.className = 'promo-page' + (i===0?' active':'');
    PROMOS.slice(i, i+PROMO_PAGE_SIZE).forEach((p, j) => {
      const card = document.createElement('div');
      card.className = 'promo-card' + (p.badgeType==='special'?' special':p.badgeType==='new'?' new':'');
      card.style.animationDelay = j*0.15+'s';
      let priceH = '<span class="promo-price">';
      if (p.oldPrice) priceH += '<span class="old-price">'+p.oldPrice+'</span>';
      priceH += p.price+'</span>';
      card.innerHTML = '<div class="promo-badge '+p.badgeType+'">'+p.badge+'</div><div class="promo-title">'+p.title+'</div><div class="promo-desc">'+p.description+'</div>'+priceH+'<div class="promo-valid">'+p.validUntil+'</div>';
      page.appendChild(card);
    });
    container.appendChild(page); pages.push(page);
    const dot = document.createElement('div');
    dot.className = 'promo-dot'+(i===0?' active':'');
    dotsC.appendChild(dot);
  }
  let cur = 0;
  if (pages.length > 1) {
    setInterval(() => {
      pages[cur].classList.remove('active');
      dotsC.children[cur].classList.remove('active');
      cur = (cur+1)%pages.length;
      pages[cur].classList.add('active');
      dotsC.children[cur].classList.add('active');
      pages[cur].querySelectorAll('.promo-card').forEach((c,j) => {
        c.style.animation='none'; c.offsetHeight;
        c.style.animation='slideIn 0.5s ease forwards';
        c.style.animationDelay=j*0.15+'s';
      });
    }, PROMO_INTERVAL);
  }
}

function buildSlideshow() {
  const c = document.getElementById('slideshow');
  SLIDES.forEach((s,i) => {
    const d = document.createElement('div');
    d.className = 'slide'+(i===0?' active':'');
    d.innerHTML = '<img src="'+s.img+'" alt=""><div class="slide-overlay"><div class="slide-title">'+s.title+'</div><div class="slide-sub">'+s.sub+'</div></div>';
    c.appendChild(d);
  });
  const ind = document.createElement('div');
  ind.className='slide-indicators';
  SLIDES.forEach((_,i) => {
    const dot = document.createElement('div');
    dot.className='indicator'+(i===0?' active':'');
    ind.appendChild(dot);
  });
  c.appendChild(ind);
  let cur=0;
  const slides=c.querySelectorAll('.slide');
  const dots=ind.querySelectorAll('.indicator');
  setInterval(() => {
    slides[cur].classList.remove('active');
    dots[cur].classList.remove('active');
    cur=(cur+1)%slides.length;
    slides[cur].classList.add('active');
    dots[cur].classList.add('active');
  }, SLIDE_INTERVAL);
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleString('en-US', { weekday:'long', hour:'2-digit', minute:'2-digit', hour12:true });
}

buildPromos(); buildSlideshow(); updateClock();
setInterval(updateClock, 30000);
setTimeout(() => location.reload(), 1800000);
</script>
